name: Build and Update Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build Pages
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out Repo
        uses: actions/checkout@v6

      - name: ⬇️ Checkout Badges
        uses: actions/checkout@v6
        with:
          repository: andrewjswan/andrewjswan
          ref: master
          path: badges

      - name: 🎭 Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: 📦 Install dependencies
        run: |
          pip install beautifulsoup4 PyYAML

      - name: 📦 Install mkDocs
        run: pip install mkdocs-material

      - name: 📦 Install mkDocs Plug-ins
        run: |
          pip install mkdocs-video
          pip install "mkdocs-material[imaging]"

      - name: 🏅 Prepare Badges and Docs
        run: |
          mkdir -p docs/badges
          
          if [ -d "badges/my-badges/" ]; then
            cp badges/my-badges/*.md docs/badges/
          fi

          find docs/badges/ -name "*.md" -exec sed -i -E 's|<a href="([^"]+)">#[0-9]+</a>:? (.*)|\2 - \1|g' {} +
          find docs/badges/ -name "*.md" -exec sed -i -E 's|<a href="([^"]+)">([^<#][^<]+)</a>|\2 - \1|g' {} +
          find docs/badges/ -name "*.md" -exec sed -i -E 's|<a href="([^"]+)">([^<]+)</a>|\2 - \1|g' {} +

          find docs/badges/ -name "*.md" -exec sed -i 's/<img src="/<img align="left" style="margin-right: 15px;" src="/g' {} +
          find docs/badges/ -name "*.md" -exec sed -i 's|</strong>|</strong><div style="clear: both;"></div>|g' {} +

          find docs/badges/ -name "*.md" -exec sed -i 's|<br><br>||g' {} +

          sed -i 's|<a href="my-badges/|<a href="badges/|g' badges/README.md
          sed -i 's|.md"><img|"><img|g' badges/README.md

          echo -e "\n### Achievements\n" >> docs/index.md
          awk '/<!-- my-badges start -->/{flag=1; next} /<!-- my-badges end -->/{flag=0} flag' badges/README.md >> docs/index.md

      - name: 🗺️ Update MkDocs Nav
        run: |
          import os
          import yaml

          config_path = '.mkdocs.yml'
          badges_dir = 'docs/badges'
          
          if os.path.exists(badges_dir):
              files = sorted([f'badges/{f}' for f in os.listdir(badges_dir) if f.endswith('.md')])
          else:
              files = []

          with open(config_path, 'r', encoding='utf-8') as f:
              config = yaml.unsafe_load(f)

          found = False
          if 'nav' in config:
              for item in config['nav']:
                  if isinstance(item, dict) and 'Badges' in item:
                      item['Badges'] = files
                      found = True
                      break
          
          if not found:
              print("Warning: Section 'Badges: []' not found in nav!")

          with open(config_path, 'w', encoding='utf-8') as f:
              yaml.dump(config, f, sort_keys=False, allow_unicode=True)
        shell: python

      - name: 🗂️ Update GitHub Achievements
        run: |
          import requests
          from bs4 import BeautifulSoup
          import re
          import os

          username = "andrewjswan"
          url = f"https://github.com/{username}?tab=achievements"
          style= "width:60px; display:inline-block; background:none; border:none; box-shadow:none;"
          out_path = "docs/index.md"

          response = requests.get(url)
          soup = BeautifulSoup(response.text, 'html.parser')

          achievements = soup.find_all('img', class_='achievement-badge-card', src=True)

          badge_md = ""
          for img in achievements:
              src = img['src']
              alt = img.get('alt', 'Achievement')
              badge_md += f'[![{alt}]({src}){{ loading=lazy style="{style}" }}]({url}) '

          if not os.path.exists(out_path):
              with open(out_path, "w") as f: f.write("<!-- START_SECTION:achievements -->\n<!-- END_SECTION:achievements -->")

          with open(out_path, "r", encoding="utf-8") as f:
              content = f.read()

          pattern = r"<!-- START_SECTION:achievements -->.*<!-- END_SECTION:achievements -->"
          replacement = f"<!-- START_SECTION:achievements -->\n{badge_md}\n<!-- END_SECTION:achievements -->"

          if re.search(pattern, content, flags=re.DOTALL):
              new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)
              with open(out_path, "w", encoding="utf-8") as f:
                  f.write(new_content)
          else:
              print("No markers were found!")
        shell: python

      - name: 🗂️ Generate Repositories Page
        run: |
          import os
          import re
          import requests

          username = "andrewjswan"
          output_path = "docs/repos.md"
          exclude_repos = ["andrewjswan", "andrewjswan.github.io"] 
          token = os.getenv("GITHUB_TOKEN")
          headers = {"Authorization": f"token {token}"} if token else {}

          def get_icon_color(hex_color):
              hex_color = hex_color.lstrip('#')
              if len(hex_color) != 6: return "white"
              r, g, b = int(hex_color[0:2], 16), int(hex_color[2:4], 16), int(hex_color[4:6], 16)
              brightness = (r * 299 + g * 587 + b * 114) / 1000
              return "black" if brightness > 155 else "white"

          langs_config = {
              "Python": {"color": "3776AB", "logo": "python"},
              "JavaScript": {"color": "F7DF1E", "logo": "javascript"},
              "TypeScript": {"color": "3178C6", "logo": "typescript"},
              "Java": {"color": "ED8B00", "logo": "openjdk"},
              "C++": {"color": "00599C", "logo": "cplusplus"},
              "C": {"color": "A8B9CC", "logo": "c", "logoColor": "white"},
              "C#": {"color": "239120", "logo": "c"},
              "Delphi": {"color": "F11E11", "logo": "delphi"},
              "Object Pascal": {"color": "F11E11", "logo": "delphi"},
              "Go": {"color": "00ADD8", "logo": "go"},
              "Rust": {"color": "000000", "logo": "rust"},
              "Ruby": {"color": "CC342D", "logo": "ruby"},
              "PHP": {"color": "777BB4", "logo": "php"},
              "Swift": {"color": "F05138", "logo": "swift"},
              "Kotlin": {"color": "7F52FF", "logo": "kotlin"},
              "Dart": {"color": "0175C2", "logo": "dart"},
              "Scala": {"color": "DC322F", "logo": "scala"},
              "R": {"color": "276DC3", "logo": "r"},
              "Perl": {"color": "39457E", "logo": "perl"},
              "Haskell": {"color": "5D4F85", "logo": "haskell"},
              "Elixir": {"color": "4B275F", "logo": "elixir"},
              "Shell": {"color": "4EAA25", "logo": "gnubash"},
              "Lua": {"color": "2C2D72", "logo": "lua"},
              "Zig": {"color": "F7A41D", "logo": "zig"},
              "Nim": {"color": "FFE953", "logo": "nim"},
              "ESPHome": {"color": "44739E", "logo": "esphome"}
          }

          tools_config = {
              "HTML": {"color": "E34F26", "logo": "html5"},
              "CSS": {"color": "1572B6", "logo": "css"},
              "SCSS": {"color": "CC6699", "logo": "sass"},
              "Vue": {"color": "4FC08D", "logo": "vuedotjs"},
              "Svelte": {"color": "FF3E00", "logo": "svelte"},
              "React": {"color": "61DAFB", "logo": "react"},
              "Node.js": {"color": "339933", "logo": "node.js"},
              "Jupyter Notebook": {"color": "F37626", "logo": "jupyter"},
              "Jupyter": {"color": "F37626", "logo": "jupyter"},
              "Home Assistant": {"color": "41BDF5", "logo": "homeassistant", "logoColor": "white"},
              "Docker": {"color": "2496ED", "logo": "docker"},
              "Dockerfile": {"color": "2496ED", "logo": "docker"},
              "HCL": {"color": "7B42BC", "logo": "terraform"},
              "Nix": {"color": "5277C3", "logo": "nixos"},
              "PowerShell": {"color": "5391FE", "logo": "powershell"},
              "Git": {"color": "F05032", "logo": "git"},
              "MySQL": {"color": "4479A1", "logo": "mysql"},
              "PostgreSQL": {"color": "4169E1", "logo": "postgresql"},
              "Linux": {"color": "FCC624", "logo": "linux"},
              "Jinja": {"color": "B41717", "logo": "jinja"},
              "Batchfile": {"color": "4EAA25", "logo": "gnubash"},
              "Arduino": {"color": "00979D", "logo": "arduino"},
              "Raspberry Pi": {"color": "C51A4A", "logo": "raspberrypi"},
              "Markdown": {"color": "000000", "logo": "markdown"},
              "JSON": {"color": "000000", "logo": "json"}
          }

          TOOL_PATTERNS = [
              (r'react', "React"), (r'vue', "Vue"), (r'svelte', "Svelte"),
              (r'node', "Node.js"), (r'docker', "Docker"), (r'nix', "Nix"),
              (r'terraform|hcl', "HCL"), (r'postgres', "PostgreSQL"), 
              (r'mysql', "MySQL"), (r'git(?!hub)', "Git"), (r'linux', "Linux"),
              (r'home assistant|homeassistant', "Home Assistant"), (r'jinja', "Jinja")
          ]

          url = f"https://api.github.com/users/{username}/repos?per_page=100"
          response = requests.get(url)

          if response.status_code == 200:
              all_repos = response.json()
              filtered = [r for r in all_repos if not r['fork'] and r['name'] not in exclude_repos]
              
              found_langs = set()
              found_tools = set()
              full_text = ""

              for r in filtered:
                  desc = r.get('description') or ""
                  topics = " ".join(r.get('topics', []))
                  full_text += f"{r['name']} {desc} {topics} ".lower()

                  lang = r.get('language')
                  if lang in langs_config: found_langs.add(lang)
                  elif lang in tools_config: found_tools.add(lang)
                  
                  try:
                      lang_data = requests.get(r['languages_url'], headers=headers).json()
                      for l in lang_data.keys():
                          if l in langs_config: found_langs.add(l)
                          elif l in tools_config: found_tools.add(l)
                  except: pass

                  for t in r.get('topics', []):
                      t_clean = t.lower().replace(".", "").replace(" ", "")
                      for name in langs_config:
                          if t_clean == name.lower().replace(".", "").replace(" ", ""): found_langs.add(name)
                      for name in tools_config:
                          if t_clean == name.lower().replace(".", "").replace(" ", ""): found_tools.add(name)

              for pattern, name in TOOL_PATTERNS:
                  if re.search(pattern, full_text):
                      found_tools.add(name)
          else:
              filtered, found_langs, found_tools = [], set(), set()

          found_langs.add("ESPHome")
          found_langs.add("Delphi")
          found_tools.add("Home Assistant")

          all_badges = []
          for tech_list, config in [(sorted(found_langs), langs_config), (sorted(found_tools), tools_config)]:
              for name in tech_list:
                  i_color = config[name].get('logoColor', get_icon_color(config[name]['color']))
                  safe_name = name.replace(' ', '%20').replace('#', '%23').replace('+', '%2B')
                  all_badges.append(f"![](https://img.shields.io/badge/{safe_name}-{config[name]['color']}?logo={config[name]['logo']}&logoColor={i_color}&style=for-the-badge)")

          with open(output_path, "w", encoding="utf-8") as f:
              f.write("# Projects\n\n")
              
              if all_badges:
                  f.write("### 🛠 Languages & Technologies\n")
                  f.write(" ".join(all_badges) + "\n\n")

              filtered.sort(key=lambda x: (x['stargazers_count'], x['updated_at']), reverse=True)
              top_repos = [r['name'] for r in filtered[:6]]
              other_repos = [r['name'] for r in filtered[6:30]]

              if top_repos:
                  f.write("## ⭐ Top Projects\n\n<div markdown=\"1\">\n\n")
                  for repo in top_repos:
                      url = f"https://github-readme-stats.vercel.app/api/pin/?username={username}&repo={repo}"
                      f.write(f"[![{repo}]({url}#only-light)](https://github.com/{username}/{repo})\n")
                      url = f"https://github-readme-stats.vercel.app/api/pin/?username={username}&repo={repo}&bg_color=151515&title_color=fff&text_color=ccc&icon_color=526cfe&hide_border=true"
                      f.write(f"[![{repo}]({url}#only-dark)](https://github.com/{username}/{repo})\n")
                  f.write("\n</div>\n\n")

              if other_repos:
                  f.write("## 📂 Other Projects\n\n<div markdown=\"1\">\n\n")
                  for repo in other_repos:
                      url = f"https://github-readme-stats.vercel.app/api/pin/?username={username}&repo={repo}"
                      f.write(f"[![{repo}]({url}#only-light)](https://github.com/{username}/{repo})\n")
                      url = f"https://github-readme-stats.vercel.app/api/pin/?username={username}&repo={repo}&bg_color=151515&title_color=fff&text_color=ccc&icon_color=526cfe&hide_border=true"
                      f.write(f"[![{repo}]({url}#only-dark)](https://github.com/{username}/{repo})\n")
                  f.write("\n</div>\n")

                  f.write("## ♾️ All Repositories\n\n")
                  f.write('!!! danger "All Repositories"\n\n')
                  f.write(f'    More projects and contributions are available on my [GitHub profile](https://github.com/{username}?tab=repositories).\n')
        shell: python

      - name: 💅 Build the docs site
        run: mkdocs build --config-file .mkdocs.yml

      - name: 🚀 Deploy to GitHub Pages
        run: mkdocs gh-deploy --config-file .mkdocs.yml --force
